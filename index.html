<!DOCTYPE html>
<html lang="nl">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Mood Scanner
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;
    }

    body {

      font-family: Arial, sans-serif;

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #1e293b,
          #111827
        );

      min-height: 100vh;

      display: flex;

      justify-content: center;

      padding: 30px;

      color: white;
    }

    .container {

      width: 100%;

      max-width: 520px;
    }

    .card {

      background:
        rgba(255,255,255,0.08);

      backdrop-filter: blur(14px);

      border:
        1px solid rgba(255,255,255,0.1);

      border-radius: 28px;

      padding: 25px;

      margin-bottom: 20px;

      box-shadow:
        0 10px 35px rgba(0,0,0,0.35);

      animation:
        fadeIn 0.5s ease;
    }

    @keyframes fadeIn {

      from {

        opacity: 0;

        transform:
          translateY(10px);
      }

      to {

        opacity: 1;

        transform:
          translateY(0);
      }
    }

    h1 {

      font-size: 34px;

      margin-bottom: 10px;
    }

    h2 {

      margin-bottom: 10px;
    }

    p {

      opacity: 0.8;

      line-height: 1.5;
    }

    button {

      border: none;

      background:
        linear-gradient(
          135deg,
          #3b82f6,
          #2563eb
        );

      color: white;

      padding: 13px 20px;

      border-radius: 16px;

      cursor: pointer;

      margin-top: 15px;

      transition: 0.25s;

      font-size: 15px;

      font-weight: bold;

      box-shadow:
        0 5px 15px rgba(37,99,235,0.3);
    }

    button:hover {

      transform:
        translateY(-2px)
        scale(1.03);
    }

    .stop-btn {

      background:
        linear-gradient(
          135deg,
          #ef4444,
          #dc2626
        );

      box-shadow:
        0 5px 15px rgba(239,68,68,0.3);
    }

    video {

      width: 100%;

      border-radius: 22px;

      margin-top: 20px;

      background: black;

      border:
        2px solid rgba(255,255,255,0.1);

      box-shadow:
        0 0 25px rgba(59,130,246,0.2);
    }

    .scanner-status {

      margin-top: 15px;

      color: #38bdf8;

      font-size: 14px;
    }

    .emoji {

      font-size: 82px;

      margin-top: 20px;

      animation:
        pulse 2s infinite;
    }

    @keyframes pulse {

      0% {

        transform: scale(1);
      }

      50% {

        transform: scale(1.08);
      }

      100% {

        transform: scale(1);
      }
    }

    #result {

      margin-top: 12px;
    }

    #confidence {

      margin-top: 10px;

      opacity: 0.7;
    }

    .manual-moods {

      margin-top: 20px;

      display: flex;

      flex-wrap: wrap;

      gap: 10px;
    }

    .manual-moods button {

      flex: 1;
    }

    .history-item {

      background: white;

      color: black;

      padding: 16px;

      border-radius: 18px;

      margin-top: 14px;

      text-align: left;

      box-shadow:
        0 4px 15px rgba(0,0,0,0.1);

      animation:
        fadeIn 0.4s ease;
    }

    .history-item small {

      color: #666;
    }

    .stats-grid {

      display: grid;

      grid-template-columns:
        repeat(2,1fr);

      gap: 10px;
    }

    .stats-item {

      background:
        rgba(255,255,255,0.08);

      padding: 16px;

      border-radius: 16px;

      text-align: center;

      border:
        1px solid rgba(255,255,255,0.08);
    }

    #historyList {

      max-height: 420px;

      overflow-y: auto;

      padding-right: 5px;
    }

    #historyList::-webkit-scrollbar {

      width: 6px;
    }

    #historyList::-webkit-scrollbar-thumb {

      background:
        rgba(255,255,255,0.2);

      border-radius: 10px;
    }

    .hidden {

      display: none;
    }

  </style>

</head>
<body>

  <div class="container">

    <div
      id="startScreen"
      class="card"
    >

      <h1>
        Mood Scanner
      </h1>

      <p>
        Scan je gezicht en ontdek je mood 😎
      </p>

      <button onclick="startScanner()">
        Start Scan
      </button>

    </div>

    <div
      id="scanner"
      class="card hidden"
    >

      <h2>
        Scanner actief
      </h2>

      <p class="scanner-status">
        AI analyseert je emoties...
      </p>

      <video
        id="webcam"
        autoplay
        playsinline
        muted
      ></video>

      <div
        class="emoji"
        id="emoji"
      >
        🙂
      </div>

      <h2 id="result">
        Wachten op detectie...
      </h2>

      <p id="confidence">
        Confidence: 0%
      </p>

      <div class="manual-moods">

        <button onclick="manualMood('blij')">
          😎 Blij
        </button>

        <button onclick="manualMood('moe')">
          😴 Moe
        </button>

        <button onclick="manualMood('gestrest')">
          😵 Gestrest
        </button>

        <button onclick="manualMood('verdrietig')">
          🥺 Verdrietig
        </button>

      </div>

      <button
        class="stop-btn"
        onclick="stopScanner()"
      >
        Stop Scan
      </button>

    </div>

    <div class="card">

      <h2>
        Statistieken
      </h2>

      <div
        id="stats"
        class="stats-grid"
      ></div>

    </div>

    <div class="card">

      <h2>
        Geschiedenis
      </h2>

      <div id="historyList"></div>

      <button onclick="clearHistory()">
        Reset geschiedenis
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
