<!DOCTYPE html>
<html lang="nl">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Mood Scanner
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;
    }

    body {

      font-family: Arial, sans-serif;

      background: #0f172a;

      color: white;

      display: flex;

      justify-content: center;

      padding: 30px;
    }

    .container {

      width: 100%;

      max-width: 520px;
    }

    .card {

      background: #1e293b;

      border-radius: 24px;

      padding: 25px;

      margin-bottom: 20px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {

      font-size: 32px;

      margin-bottom: 10px;
    }

    h2 {

      margin-bottom: 10px;
    }

    p {

      opacity: 0.8;
    }

    button {

      border: none;

      background: #3b82f6;

      color: white;

      padding: 12px 18px;

      border-radius: 14px;

      cursor: pointer;

      margin-top: 15px;

      transition: 0.2s;

      font-size: 15px;
    }

    button:hover {

      transform: scale(1.04);
    }

    .stop-btn {

      background: #ef4444;
    }

    video {

      width: 100%;

      border-radius: 20px;

      margin-top: 20px;

      background: black;
    }

    .emoji {

      font-size: 75px;

      margin-top: 20px;
    }

    #result {

      margin-top: 10px;
    }

    #confidence {

      margin-top: 10px;

      opacity: 0.7;
    }

    .manual-moods {

      margin-top: 20px;
    }

    .manual-moods button {

      margin: 5px;
    }

    .history-item {

      background: white;

      color: black;

      padding: 15px;

      border-radius: 16px;

      margin-top: 12px;

      text-align: left;
    }

    .history-item small {

      color: #555;
    }

    .stats-item {

      background: #334155;

      padding: 14px;

      border-radius: 14px;

      margin-top: 10px;
    }

    #historyList {

      max-height: 400px;

      overflow-y: auto;
    }

    .hidden {

      display: none;
    }

  </style>

</head>
<body>

  <div class="container">

    <div
      id="startScreen"
      class="card"
    >

      <h1>
        Mood Scanner
      </h1>

      <p>
        Scan je gezicht en ontdek je mood 😎
      </p>

      <button onclick="startScanner()">
        Start Scan
      </button>

    </div>

    <div
      id="scanner"
      class="card hidden"
    >

      <h2>
        Scanner actief
      </h2>

      <video
        id="webcam"
        autoplay
        playsinline
        muted
      ></video>

      <div
        class="emoji"
        id="emoji"
      >
        🙂
      </div>

      <h2 id="result">
        Wachten op detectie...
      </h2>

      <p id="confidence">
        Confidence: 0%
      </p>

      <div class="manual-moods">

        <button onclick="manualMood('blij')">
          😎 Blij
        </button>

        <button onclick="manualMood('moe')">
          😴 Moe
        </button>

        <button onclick="manualMood('gestrest')">
          😵 Gestrest
        </button>

        <button onclick="manualMood('verdrietig')">
          🥺 Verdrietig
        </button>

      </div>

      <button
        class="stop-btn"
        onclick="stopScanner()"
      >
        Stop Scan
      </button>

    </div>

    <div class="card">

      <h2>
        Statistieken
      </h2>

      <div id="stats"></div>

    </div>

    <div class="card">

      <h2>
        Geschiedenis
      </h2>

      <div id="historyList"></div>

      <button onclick="clearHistory()">
        Reset geschiedenis
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
