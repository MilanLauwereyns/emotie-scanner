<!DOCTYPE html>
<html lang="nl">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Mood Scanner
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #111827;

      color: white;

      text-align: center;

      padding: 40px;
    }

    button {

      padding: 12px 20px;

      border: none;

      border-radius: 12px;

      background: #2563eb;

      color: white;

      cursor: pointer;

      margin-top: 20px;
    }

    .hidden {

      display: none;
    }

    .card {

      background: #1f2937;

      padding: 30px;

      border-radius: 20px;

      max-width: 500px;

      margin: auto;

      margin-bottom: 20px;
    }

    video {

      width: 100%;

      border-radius: 20px;

      margin-top: 20px;

      background: black;
    }

    .emoji {

      font-size: 70px;

      margin-top: 20px;
    }

    .history-item {

      background: #374151;

      padding: 15px;

      border-radius: 12px;

      margin-top: 10px;

      text-align: left;
    }

  </style>

</head>
<body>

  <div
    id="startScreen"
    class="card"
  >

    <h1>
      Mood Scanner
    </h1>

    <p>
      Scan je gezicht en ontdek je mood 😎
    </p>

    <button onclick="startScanner()">
      Start Scan
    </button>

  </div>

  <div
    id="scanner"
    class="card hidden"
  >

    <h2>
      Scanner actief
    </h2>

    <video
      id="webcam"
      autoplay
      playsinline
      muted
    ></video>

    <div
      class="emoji"
      id="emoji"
    >
      🙂
    </div>

    <h2 id="result">
      Wachten op detectie...
    </h2>

    <p id="confidence">
      Confidence: 0%
    </p>

  </div>

  <div class="card">

    <h2>
      Geschiedenis
    </h2>

    <div id="historyList"></div>

    <button onclick="clearHistory()">
      Reset geschiedenis
    </button>

  </div>

  <script src="app.js"></script>

</body>
</html>
