<!DOCTYPE html>
<html lang="nl">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Mood Scanner
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>
<body>

  <div class="container">

    <div
      id="startScreen"
      class="card"
    >

      <h1>
        Mood Scanner
      </h1>

      <p>
        Scan je gezicht en ontdek je mood 😎
      </p>

      <button onclick="startScanner()">
        Start Scan
      </button>

    </div>

    <div
      id="scanner"
      class="card hidden"
    >

      <div class="scanner-top">

        <h2>
          Scanner actief
        </h2>

        <div class="live-dot"></div>

      </div>

      <video
        id="webcam"
        autoplay
        playsinline
        muted
      ></video>

      <div
        class="emoji"
        id="emoji"
      >
        🙂
      </div>

      <h2 id="result">
        Wachten op detectie...
      </h2>

      <p id="confidence">
        Confidence: 0%
      </p>

      <div class="manual-moods">

        <button onclick="manualMood('blij')">
          😎 Blij
        </button>

        <button onclick="manualMood('moe')">
          😴 Moe
        </button>

        <button onclick="manualMood('gestrest')">
          😵 Gestrest
        </button>

        <button onclick="manualMood('verdrietig')">
          🥺 Verdrietig
        </button>

      </div>

      <button
        class="stop-btn"
        onclick="stopScanner()"
      >
        Stop Scan
      </button>

    </div>

    <div class="card">

      <h2>
        Statistieken
      </h2>

      <div
        id="stats"
        class="stats-grid"
      ></div>

    </div>

    <div class="card">

      <h2>
        Geschiedenis
      </h2>

      <div id="historyList"></div>

      <button onclick="clearHistory()">
        Reset geschiedenis
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
