<!DOCTYPE html>
<html lang="nl">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Mood Scanner
  </title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #111827;

      color: white;

      text-align: center;

      padding: 40px;
    }

    button {

      padding: 12px 20px;

      border: none;

      border-radius: 12px;

      background: #2563eb;

      color: white;

      cursor: pointer;

      margin-top: 20px;
    }

    .hidden {

      display: none;
    }

    .card {

      background: #1f2937;

      padding: 30px;

      border-radius: 20px;

      max-width: 500px;

      margin: auto;
    }

    video {

      width: 100%;

      border-radius: 20px;

      margin-top: 20px;

      background: black;
    }

  </style>

</head>
<body>

  <div
    id="startScreen"
    class="card"
  >

    <h1>
      Mood Scanner
    </h1>

    <p>
      Scan je gezicht en ontdek je mood 😎
    </p>

    <button onclick="startScanner()">
      Start Scan
    </button>

  </div>

  <div
    id="scanner"
    class="card hidden"
  >

    <h2>
      Scanner actief
    </h2>

  
    <video
      id="webcam"
      autoplay
      playsinline
      muted
    ></video>

  </div>

  <script src="app.js"></script>

</body>
</html>
